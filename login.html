<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Tonime</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{

display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.login{

background:#1b2333;
padding:40px;
border-radius:20px;
width:380px;

}

.login h1{

margin-bottom:25px;

}

.login input{

width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:10px;

}

.login button{

width:100%;
padding:15px;
border:none;
background:#8b5cf6;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;

}

</style>

</head>

<body>

<div class="login">

<h1>Login</h1>

<input
type="email"
placeholder="Email">

<input
type="password"
placeholder="Password">

<button>

Masuk

</button>

</div>

</body>

</html>
