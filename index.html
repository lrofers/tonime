<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tonime - Anime Streaming</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/responsive.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<header class="navbar">

    <div class="logo">
        TONIME
    </div>

    <nav>

        <a href="#">Home</a>
        <a href="#">Trending</a>
        <a href="#">Popular</a>
        <a href="#">Genre</a>

    </nav>

    <div class="search-box">

        <input
        id="search"
        type="text"
        placeholder="Cari anime...">

    </div>

    <button id="theme-toggle" class="theme-btn">
    🌙
    </button>

</header>

<!-- Hero -->

<section class="hero">

    <div class="overlay"></div>

    <img
    id="hero-image"
    src="assets/banner/solo.jpg">

    <div class="hero-content">

        <span class="badge">
            TRENDING #1
        </span>

        <h1 id="hero-title">
            Solo Leveling
        </h1>

        <p id="hero-desc">

            Sung Jin Woo menjadi hunter terkuat.

        </p>

        <div class="hero-buttons">

            <button class="watch">
                ▶ Watch Now
            </button>

            <button class="info">
                Detail
            </button>

        </div>

    </div>

</section>

<!-- Trending -->

<section class="section">

<h2>🔥 Trending</h2>

<div id="trending" class="anime-grid">

</div>

</section>

<!-- Popular -->

<section class="section">

<h2>⭐ Popular</h2>

<div id="popular" class="anime-grid">

</div>

</section>

<!-- Ongoing -->

<section class="section">

<h2>📺 Ongoing</h2>

<div id="ongoing" class="anime-grid">

</div>

</section>

<!-- Completed -->

<section class="section">

<h2>✅ Completed</h2>

<div id="completed" class="anime-grid">

</div>

</section>

<footer>

Tonime © 2026

</footer>

<script src="js/anime.js"></script>
<script src="js/slider.js"></script>
<script src="js/search.js"></script>
<script src="js/app.js"></script>

</body>
</html>
